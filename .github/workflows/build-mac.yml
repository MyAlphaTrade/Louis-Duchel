name: Build macOS

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (ex: v4.0.1)'
        required: true
        default: 'v4.0.1'

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Verify source files
        run: |
          PROJECT="OneDrive/Desktop/PROJETS APP TRADE/AlphaTrade v4.0.0 - Claude"
          echo "=== Fichiers electron ==="
          ls -la "$PROJECT/electron/"
          echo "=== package.json ==="
          cat "$PROJECT/electron/package.json"

      - name: Install Python packages
        run: |
          PROJECT="OneDrive/Desktop/PROJETS APP TRADE/AlphaTrade v4.0.0 - Claude"
          pip install --target="$PROJECT/python" \
            requests anthropic openai numpy joblib scikit-learn

      - name: Install Node dependencies
        run: |
          PROJECT="OneDrive/Desktop/PROJETS APP TRADE/AlphaTrade v4.0.0 - Claude"
          cd "$PROJECT/electron"
          npm install

      - name: Build macOS DMG
        run: |
          PROJECT="OneDrive/Desktop/PROJETS APP TRADE/AlphaTrade v4.0.0 - Claude"
          cd "$PROJECT/electron"
          npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload DMG to alphatrade-releases
        uses: softprops/action-gh-release@v2
        with:
          repository: MyAlphaTrade/alphatrade-releases
          tag_name: ${{ github.event.inputs.version }}
          files: |
            OneDrive/Desktop/PROJETS APP TRADE/AlphaTrade v4.0.0 - Claude/dist/*.dmg
            OneDrive/Desktop/PROJETS APP TRADE/AlphaTrade v4.0.0 - Claude/dist/*.dmg.blockmap
            OneDrive/Desktop/PROJETS APP TRADE/AlphaTrade v4.0.0 - Claude/dist/latest-mac.yml
          token: ${{ secrets.RELEASES_TOKEN }}
          fail_on_unmatched_files: false
